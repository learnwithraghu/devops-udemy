<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CloudArchitect | Private RDS Access Pattern</title>
		<link rel="stylesheet" href="../builder.css" />
	</head>
	<body data-usecase="private-rds">
		<div class="page">
			<header class="header">
				<div>
					<h1 id="title">AWS Architecture Practice Lab</h1>
					<p id="summary">Build the correct AWS architecture by placing each service in the right part of the solution.</p>
					<button id="startBtn" class="primary" style="margin-top: 12px; margin-bottom: 6px; font-size: 1.1rem; padding: 12px 24px; border-radius: 12px;">Start Building 🚀</button>
					</div>

				<nav class="actions" aria-label="Page actions">
					<div class="nav-cluster">
						<a href="../../index.html" class="secondary button-link" title="CloudArchitect Home">🏠</a>
						<a href="../core/index.html" class="secondary button-link">← Foundation Hub</a>
					</div>
					<div class="nav-cluster">
						<button id="checkBtn" type="button" class="primary">Check My Architecture</button>
						<button id="autoBtn" type="button" class="secondary">Show Correct Answer</button>
						<button id="resetBtn" type="button" class="secondary">Try Again</button>
					</div>
				</nav>
			</header>

			<main class="layout">
				<aside class="panel" aria-labelledby="builderHeading">
					<h2 id="builderHeading">Builder</h2>

					<p id="selectedText">Choose a service, then place it where it belongs in the architecture.</p>


					<section aria-labelledby="paletteHeading">
						<h3 id="paletteHeading">Service Palette</h3>
						<div id="palette"></div>
					</section>

					<section aria-labelledby="feedbackHeading">
						<h3 id="feedbackHeading">Feedback</h3>
						<div id="progress" class="result" aria-live="polite" aria-atomic="true"></div>
						<div id="result" class="result" aria-live="polite" aria-atomic="true"></div>
					</section>
				</aside>

				<section class="canvas-wrap" aria-labelledby="workspaceHeading">
					<h2 id="workspaceHeading" class="sr-only">Architecture Workspace</h2>
					<div id="canvas" class="canvas" role="region" aria-label="Architecture building canvas">
						<div id="lines"></div>
					</div>
				</section>
			</main>
		</div>

		<script src="../usecase-data.js"></script>
		<script src="../builder.js"></script>
	</body>
</html>
